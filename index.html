<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Archive</title>
    <style>
        :root { --bg: #f4f7f6; --accent: #0984e3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; align-items: center; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #status { color: #d63031; font-size: 0.85rem; margin-top: 10px; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Archive Access</h2>
    <p style="font-size: 0.9rem; color: #636e72;">The exam has concluded. Enter the access key to view archives.</p>
    <input type="password" id="pw" placeholder="Enter Password">
    <button onclick="unlock()">Unlock</button>
    <div id="status"></div>
</div>

<script>
    // This array contains the "difference" between your password characters 
    // and the URL characters. Without the password, these numbers are useless.
    const enc = [7,12,11,11,5,15,53,62,56,1,5,10,13,12,4,11,62,1,1,10,8,11,2,62,9,15,52,9,5,1,18,3,8,9,22,5,4,48,49];

    function unlock() {
        const p = document.getElementById('pw').value;
        const s = document.getElementById('status');
        
        if (p.length === 0) return;

        let r = "";
        for (let i = 0; i < enc.length; i++) {
            // It takes the character code of the password (looping) 
            // and adds the 'enc' value to reconstruct the URL.
            r += String.fromCharCode(p.charCodeAt(i % p.length) + enc[i]);
        }

        // The code only redirects if the math results in a valid URL prefix.
        if (r.startsWith("https://")) {
            s.style.color = "#00b894";
            s.innerText = "Access Granted.";
            window.location.href = r;
        } else {
            s.innerText = "Invalid credentials.";
        }
    }
</script>

</body>
</html>
