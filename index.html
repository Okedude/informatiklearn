<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archived Access</title>
    <style>
        :root { --bg: #f8f9fa; --primary: #2d3436; --blue: #0984e3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; align-items: center; justify-content: center; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { font-size: 1.4rem; color: var(--primary); margin-bottom: 0.5rem; }
        p { color: #636e72; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue); }
        button { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #msg { color: #d63031; font-size: 0.85rem; margin-top: 12px; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Restricted Archive</h1>
    <p>Exam has passed. Verify to access.</p>
    
    <input type="text" id="user" placeholder="Username" autocomplete="off">
    <input type="password" id="pass" placeholder="Password">
    
    <button onclick="validate()">Unlock Access</button>
    <div id="msg"></div>
</div>

<script>
    // SHA-256 Hash of "apwinf26"
    const kH = "29437145e3962b80f93796d8f284e365022f18375470d069b76735e236528d22";
    // Base64 Encoded URL
    const rD = "aHR0cHM6Ly9va2VkdWRlLmdpdGh1Yi5pby9pZWFyY2hpdmUwMQ==";

    async function hash(s) {
        const utf8 = new TextEncoder().encode(s);
        const hb = await crypto.subtle.digest('SHA-256', utf8);
        return Array.from(new Uint8Array(hb)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function validate() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const m = document.getElementById('msg');

        if (u === "access" && (await hash(p)) === kH) {
            m.style.color = "#00b894";
            m.innerText = "Authorized...";
            // Decodes and redirects
            window.location.href = atob(rD);
        } else {
            m.innerText = "Invalid credentials.";
        }
    }
</script>

</body>
</html>
