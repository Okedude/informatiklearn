<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Archive</title>
    <style>
        :root { --bg: #f8f9fa; --blue: #0984e3; }
        body { font-family: sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; align-items: center; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #status { color: #d63031; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Secure Gateway</h2>
    <p style="font-size: 0.9rem; color: #666;">Enter password to reveal archive.</p>
    <input type="password" id="pw" placeholder="Password">
    <button onclick="unlock()">Access</button>
    <div id="status"></div>
</div>

<script>
    // This is the URL encrypted using XOR with "apwinf26"
    // The actual URL is NOT in the source code in readable or Base64 form.
    const encryptedData = [8,20,20,16,19,94,87,87,15,11,5,4,21,21,4,5,70,7,9,20,8,11,2,70,9,15,92,9,5,1,18,3,8,9,22,5,4,48,49];

    function unlock() {
        const pw = document.getElementById('pw').value;
        const status = document.getElementById('status');
        
        if (!pw) return;

        // Decrypt using the password as the XOR key
        let result = "";
        for (let i = 0; i < encryptedData.size || i < encryptedData.length; i++) {
            result += String.fromCharCode(encryptedData[i] ^ pw.charCodeAt(i % pw.length));
        }

        // Validate if the result looks like a URL
        if (result.startsWith("https://")) {
            status.style.color = "green";
            status.innerText = "Success. Redirecting...";
            window.location.href = result;
        } else {
            status.innerText = "Invalid Password.";
        }
    }
</script>
</body>
</html>
