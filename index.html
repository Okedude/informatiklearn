<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Period Expired</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #2d3436;
            --accent-color: #0984e3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 500px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #dfe6e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .pulse {
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(9, 132, 227, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(9, 132, 227, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(9, 132, 227, 0); }
        }

        h1 { font-size: 1.8rem; margin-bottom: 1rem; }
        p { line-height: 1.6; color: #636e72; }

        .link-box {
            margin-top: 2rem;
            padding: 1rem;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            background: white;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-circle">
            <div class="pulse"></div>
        </div>
        <h1>Session Expired</h1>
        <p>This site is about an exam that has already passed. Access to this specific portal is no longer active.</p>
        
        <div class="link-box">
            Please refer to the archive here:<br>
            <a href="https://okedude.github.io/iearchive01">okedude.github.io/iearchive01</a>
        </div>
    </div>

</body>
</html>
