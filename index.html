<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archived Access</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #2d3436;
            --accent-color: #0984e3;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #636e72; font-size: 0.9rem; margin-bottom: 1.5rem; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }
        #error { color: #d63031; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Exam Archive</h1>
        <p>This exam has passed. Enter credentials to view the archive.</p>
        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="checkLogin()">Access Archive</button>
        <p id="error">Invalid credentials. Please try again.</p>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error');

            if (user === "access" && pass === "apwinf26") {
                window.location.href = "https://okedude.github.io/iearchive01";
            } else {
                error.style.display = "block";
            }
        }
    </script>

</body>
</html>
